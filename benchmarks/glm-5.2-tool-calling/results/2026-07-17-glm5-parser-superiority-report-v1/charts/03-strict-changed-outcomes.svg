<svg
  aria-labelledby="title desc"
  height="960"
  role="img"
  viewBox="0 0 1600 960"
  width="1600"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="title">
    Strict outcomes among same-byte Native-Plus changed captures
  </title>
  <desc id="desc">
    Changed captures produced 5 strict wins, 3 still-wrong neutral outcomes, and
    0 losses.
  </desc>
  <defs>
    <filter height="140%" id="shadow" width="120%" x="-10%" y="-15%">
      <feDropShadow
        dx="0"
        dy="4"
        flood-color="#0f172a"
        flood-opacity="0.09"
        stdDeviation="7"
      />
    </filter>
    <marker
      id="arrow"
      markerHeight="7"
      markerWidth="7"
      orient="auto-start-reverse"
      refX="8.5"
      refY="5"
      viewBox="0 0 10 10"
    >
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>
  <rect fill="#f8fafc" height="100%" width="100%" />
  <style>
  text {
    font-family:
      Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial,
      sans-serif;
    fill: #0f172a;
  }
  .title {
    font-family: Arial, sans-serif;
    font-size: 34px;
    font-weight: 700;
  }
  .subtitle {
    font-size: 17px;
    fill: #475569;
  }
  .section {
    font-size: 20px;
    font-weight: 800;
  }
  .box-title {
    font-size: 17px;
    font-weight: 800;
  }
  .body {
    font-size: 14px;
    fill: #475569;
  }
  .small {
    font-size: 12px;
    fill: #64748b;
  }
  .label {
    font-size: 15px;
    font-weight: 700;
  }
  .value {
    font-size: 17px;
    font-weight: 800;
  }
  .metric {
    font-size: 25px;
    font-weight: 850;
  }
  .mono {
    font-family: "SFMono-Regular", Consolas, monospace;
    font-size: 13px;
    fill: #334155;
  }
  .shadow {
    filter: url(#shadow);
  }
  </style>
  <text class="title" x="64" y="70">
    Oracle-scored outcomes among changed captures
  </text>
  <text class="subtitle" x="64" y="110">
    Only the 8 responses whose calls or text changed are shown. Unchanged
    captures are outside this panel.
  </text>
  <rect
    class="shadow"
    fill="#ffffff"
    height="536"
    rx="20"
    stroke="#cbd5e1"
    width="1472"
    x="64"
    y="158"
  />
  <text class="section" x="104" y="251">Strict win</text>
  <rect fill="#f1f5f9" height="54" rx="12" width="900" x="424" y="222" />
  <rect fill="#059669" height="54" rx="12" width="900.0" x="424" y="222" />
  <text class="metric" fill="#059669" x="1364" y="260">5</text>
  <text class="body" x="424" y="304">Native wrong → Native-Plus correct</text>
  <text class="section" x="104" y="395">Still-wrong neutral</text>
  <rect fill="#f1f5f9" height="54" rx="12" width="900" x="424" y="366" />
  <rect fill="#d97706" height="54" rx="12" width="540.0" x="424" y="366" />
  <text class="metric" fill="#d97706" x="1364" y="404">3</text>
  <text class="body" x="424" y="448">
    Output changed, oracle outcome stayed wrong
  </text>
  <text class="section" x="104" y="539">Strict loss</text>
  <rect fill="#f1f5f9" height="54" rx="12" width="900" x="424" y="510" />
  <rect fill="#b91c1c" height="54" rx="12" width="0.0" x="424" y="510" />
  <text class="metric" fill="#b91c1c" x="1364" y="548">0</text>
  <text class="body" x="424" y="592">Native correct → Native-Plus wrong</text>
  <rect
    fill="#eff6ff"
    height="132"
    rx="18"
    stroke="#93c5fd"
    width="710"
    x="64"
    y="744"
  />
  <text class="section" fill="#1d4ed8" x="96" y="788">
    Case-level exact McNemar
  </text>
  <text class="metric" fill="#1d4ed8" text-anchor="end" x="742" y="809">
    p = 0.0625
  </text>
  <text class="body" x="96" y="842">
    5 semantic wins and 0 losses are directional; interpret them separately from
    the call-acceptance test.
  </text>
  <rect
    fill="#f0fdf4"
    height="132"
    rx="18"
    stroke="#86efac"
    width="710"
    x="826"
    y="744"
  />
  <text class="section" fill="#047857" x="858" y="788">
    Unchanged accepted captures
  </text>
  <text class="metric" fill="#047857" text-anchor="end" x="1504" y="809">
    1,366
  </text>
  <text class="body" x="858" y="842">
    Native-Plus left their accepted call/text output exact.
  </text>
  <text class="small" x="64" y="928">
    Source: strict-discordance.csv cross-checked against summary.json. Neutral
    means no semantic gain, not parser failure.
  </text>
</svg>
