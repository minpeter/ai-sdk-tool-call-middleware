  <text class="section" fill="#047857" x="96" y="748">
    Unified AI SDK output and stream lifecycle
  </text>
  <text class="body" text-anchor="start" x="96" y="786">
    <tspan dy="0" x="96">
      Schema-valid tool-call parts + remaining assistant text · native-wins
      arbitration
    </tspan>
    <tspan dy="27" x="96">
      SSE finalization holds uncertain deltas until calls are accepted, then
      balances start / delta / end.
    </tspan>
  </text>
  <text class="small" x="64" y="926">
    Sources: glm5-native-call-repair.ts, glm5-native-text-fallback.ts,
    native-primary-stream.ts, preconfigured-middleware.ts.
  </text>
