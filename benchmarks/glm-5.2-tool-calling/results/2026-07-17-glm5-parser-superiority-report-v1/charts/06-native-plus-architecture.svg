  <text class="title" x="64" y="70">
    GLM-5.2 Native-Plus parsing architecture
  </text>
  <text class="subtitle" x="64" y="110">
    Provider Native remains primary. Repair and text fallback are bounded,
    schema-aware, and ordered by Native-wins arbitration.
  </text>
