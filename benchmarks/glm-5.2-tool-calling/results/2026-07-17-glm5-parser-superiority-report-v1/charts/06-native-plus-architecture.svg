  <text class="body" text-anchor="start" x="86" y="244">
    <tspan dy="0" x="86">Native structured calls</tspan>
    <tspan dy="23" x="86">Assistant text · JSON or SSE</tspan>
  </text>
  <line
    stroke="#2563eb"
