  <rect
    class="shadow"
    fill="#eff6ff"
    height="222"
    rx="16"
    stroke="#60a5fa"
    stroke-width="2"
    width="452"
    x="64"
    y="388"
  />
  <text class="box-title" fill="#1d4ed8" x="86" y="422">
    Native-primary lane
  </text>
  <text class="body" text-anchor="start" x="86" y="454">
    <tspan dy="0" x="86">Preserve already-valid structured calls</tspan>
    <tspan dy="23" x="86">Repair bounded relaxed JSON / final delimiter</tspan>
    <tspan dy="23" x="86">Recover opaque object references only where</tspan>
    <tspan dy="23" x="86">schema explicitly permits arbitrary properties</tspan>
    <tspan dy="23" x="86">Native call suppresses any text fallback</tspan>
  </text>
  <rect
    class="shadow"
    fill="#fff7ed"
    height="222"
    rx="16"
    stroke="#fdba74"
    stroke-width="2"
    width="452"
    x="574"
    y="388"
  />
  <text class="box-title" fill="#c2410c" x="596" y="422">
    Fail-closed safety gates
  </text>
  <text class="body" text-anchor="start" x="596" y="454">
    <tspan dy="0" x="596">Declared tool + schema validation</tspan>
    <tspan dy="23" x="596">Duplicate / prototype-sensitive key rejection</tspan>
    <tspan dy="23" x="596">Bounded bytes, depth, and named arguments</tspan>
    <tspan dy="23" x="596">No operators, call arguments, or semicolons</tspan>
    <tspan dy="23" x="596">
      Ambiguous or unbounded truncation stays non-call
    </tspan>
  </text>
  <rect
    class="shadow"
    fill="#f5f3ff"
    height="222"
    rx="16"
    stroke="#a78bfa"
    stroke-width="2"
    width="452"
    x="1084"
    y="388"
  />
  <text class="box-title" fill="#7c3aed" x="1106" y="422">
    Text-fallback lane
  </text>
  <text class="body" text-anchor="start" x="1106" y="454">
    <tspan dy="0" x="1106">Only when Native emitted zero calls</tspan>
    <tspan dy="23" x="1106">Canonical GLM XML with schema coercion</tspan>
    <tspan dy="23" x="1106">or whole-response anchored bare call</tspan>
    <tspan dy="23" x="1106">Unknown tool / unsafe input rejected</tspan>
    <tspan dy="23" x="1106">Fallback text removed only after acceptance</tspan>
  </text>
